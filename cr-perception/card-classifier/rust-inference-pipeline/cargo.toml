[package]
name = "clash-tracker"
version = "0.1.0"
edition = "2021"

[lib]
name = "clash_tracker"
path = "src/lib.rs"

[[bin]]
name = "batch"
path = "src/batch.rs"

[[bin]]
name = "gatekeeper"
path = "src/gatekeeper.rs"

[dependencies]
opencv = { version = "0.93", features = ["clang-runtime"] }
ort = { version = "2.0.0-rc.12", features = ["coreml"] }
ndarray = "0.16"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
image = "0.25"
indicatif = "0.17"
rayon = "1.10"
anyhow = "1"