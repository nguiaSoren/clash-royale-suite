<svg viewBox="0 0 840 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="700" fill="#ffffff" rx="0"/>

  <!-- ══ SHARED: Video Decode (top center) ══ -->
  <rect x="310" y="15" width="220" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="420" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">OpenCV VideoCapture</text>
  <text x="420" y="53" text-anchor="middle" font-size="9.5" fill="#374151">decode frame → BGR Mat → RgbImage</text>

  <!-- Source info callout -->
  <rect x="600" y="15" width="150" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="675" y="34" text-anchor="middle" font-size="9.5" font-weight="600" fill="#92400e">iPhone Recording</text>
  <text x="675" y="48" text-anchor="middle" font-size="8.5" fill="#92400e">5 fixed ROIs · 8,702 frames</text>
  <line x1="600" y1="40" x2="533" y2="40" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Split from decode -->
  <line x1="420" y1="65" x2="420" y2="85" stroke="#888" stroke-width="1.5"/>
  <line x1="420" y1="85" x2="195" y2="85" stroke="#888" stroke-width="1.5"/>
  <line x1="195" y1="85" x2="195" y2="105" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="85" x2="630" y2="85" stroke="#888" stroke-width="1.5"/>
  <line x1="630" y1="85" x2="630" y2="105" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ LEFT: BATCH MODE ══ -->
  <rect x="30" y="110" width="330" height="30" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="195" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">BATCH MODE · batch.rs</text>

  <rect x="70" y="158" width="250" height="42" rx="7" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="195" y="176" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5b21b6">All 5 slots → always inferred</text>
  <text x="195" y="192" text-anchor="middle" font-size="9" fill="#888">no filtering, no state tracking</text>

  <line x1="195" y1="200" x2="195" y2="225" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="50" y="230" width="290" height="65" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="195" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Rayon Parallel Preprocessing</text>
  <rect x="66" y="258" width="48" height="25" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="90" y="275" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 1</text>
  <rect x="120" y="258" width="48" height="25" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="144" y="275" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 2</text>
  <rect x="174" y="258" width="48" height="25" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="198" y="275" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 3</text>
  <rect x="228" y="258" width="48" height="25" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="252" y="275" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 4</text>
  <rect x="282" y="258" width="48" height="25" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="306" y="275" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 5</text>

  <line x1="195" y1="295" x2="195" y2="318" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="312" text-anchor="middle" font-size="8" fill="#888">[5, 3, 224, 224] fixed</text>

  <rect x="55" y="323" width="280" height="50" rx="7" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="195" y="344" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5b21b6">ONNX Runtime — Batched Forward</text>
  <text x="195" y="360" text-anchor="middle" font-size="9" fill="#5b21b6">CoreML EP → Apple Neural Engine</text>

  <line x1="195" y1="373" x2="195" y2="398" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="70" y="403" width="250" height="38" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="195" y="426" text-anchor="middle" font-size="10" fill="#374151">Draw overlays + VideoWriter</text>

  <line x1="195" y1="441" x2="195" y2="466" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result: batch -->
  <rect x="60" y="471" width="270" height="70" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="72" y="484" width="12" height="12" rx="2" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="92" y="495" font-size="10" font-weight="600" fill="#5b21b6">All overlays white</text>
  <text x="72" y="515" font-size="9.5" fill="#555">22.3 FPS · 44.9 ms/frame</text>
  <text x="72" y="530" font-size="9.5" fill="#555">43,510 inferences · 0 skipped</text>

  <!-- ══ RIGHT: GATEKEEPER MODE ══ -->
  <rect x="465" y="110" width="340" height="30" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="635" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">GATEKEEPER MODE · gatekeeper.rs</text>

  <!-- State machine -->
  <rect x="475" y="152" width="320" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5"/>
  <rect x="475" y="152" width="320" height="140" rx="8" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="635" y="170" text-anchor="middle" font-size="9.5" font-weight="600" fill="#166534" letter-spacing="0.06em">PER-SLOT STATE MACHINE</text>

  <rect x="498" y="182" width="100" height="44" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.3"/>
  <text x="548" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">LOCKED</text>
  <text x="548" y="214" text-anchor="middle" font-size="8" fill="#888">skip inference</text>

  <rect x="668" y="182" width="108" height="44" rx="6" fill="#ffffff" stroke="#f43f5e" stroke-width="1.3"/>
  <text x="722" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#9f1239">UNLOCKED</text>
  <text x="722" y="214" text-anchor="middle" font-size="8" fill="#888">run inference</text>

  <line x1="598" y1="197" x2="665" y2="197" stroke="#f43f5e" stroke-width="1.2" marker-end="url(#arr-coral)"/>
  <text x="632" y="190" text-anchor="middle" font-size="7.5" fill="#9f1239">pixels Δ &gt; 6%</text>

  <line x1="668" y1="216" x2="601" y2="216" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <text x="632" y="237" text-anchor="middle" font-size="7.5" fill="#166534">softmax ≥ 90%</text>

  <rect x="505" y="252" width="260" height="28" rx="5" fill="#f8f8f8" stroke="#e5e5e5" stroke-width="0.8"/>
  <text x="635" y="270" text-anchor="middle" font-size="8.5" fill="#888">Fingerprint: 8×8 RGB grid · 192 floats · &lt;1 μs compare</text>

  <line x1="635" y1="292" x2="635" y2="318" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="635" y="310" text-anchor="middle" font-size="8" fill="#888">unlocked slots only</text>

  <rect x="490" y="323" width="290" height="55" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="635" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Rayon Parallel Preprocessing</text>
  <rect x="518" y="352" width="48" height="20" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="542" y="366" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 2</text>
  <rect x="573" y="352" width="48" height="20" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="597" y="366" text-anchor="middle" font-size="7.5" fill="#1e40af">slot 4</text>
  <rect x="628" y="352" width="48" height="20" rx="4" fill="#f3f4f6" stroke="#e5e5e5" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="652" y="366" text-anchor="middle" font-size="7.5" fill="#888">1,3,5</text>
  <text x="700" y="366" font-size="7.5" fill="#888" font-style="italic">skipped</text>

  <line x1="635" y1="378" x2="635" y2="403" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="635" y="396" text-anchor="middle" font-size="8" fill="#888">[N, 3, 224, 224] variable</text>

  <rect x="495" y="408" width="280" height="50" rx="7" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="635" y="429" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5b21b6">ONNX Runtime — Batched Forward</text>
  <text x="635" y="445" text-anchor="middle" font-size="9" fill="#5b21b6">CoreML EP → Apple Neural Engine</text>

  <line x1="635" y1="458" x2="635" y2="483" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="510" y="488" width="250" height="38" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="635" y="511" text-anchor="middle" font-size="10" fill="#374151">Draw overlays + VideoWriter</text>

  <line x1="635" y1="526" x2="635" y2="551" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result: gatekeeper -->
  <rect x="500" y="556" width="270" height="70" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="512" y="569" width="12" height="12" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="532" y="580" font-size="10" font-weight="600" fill="#166534">Green = locked (cached)</text>
  <rect x="512" y="586" width="12" height="12" rx="2" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="532" y="597" font-size="10" fill="#555">White = unlocked (inferred)</text>
  <text x="512" y="616" font-size="9.5" fill="#555">22,206 run · 21,304 skipped (49%)</text>

  <!-- ══ SHARED: Model (bottom center) ══ -->
  <rect x="305" y="650" width="230" height="42" rx="7" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="420" y="668" text-anchor="middle" font-size="10" font-weight="600" fill="#0f766e">MobileNetV3-Small · ONNX (~2.1 MB)</text>
  <text x="420" y="683" text-anchor="middle" font-size="9" fill="#0f766e">97.89% val accuracy · 15 epochs</text>

  <line x1="360" y1="650" x2="275" y2="373" stroke="#14b8a6" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="480" y1="650" x2="565" y2="458" stroke="#14b8a6" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Divider -->
  <line x1="420" y1="95" x2="420" y2="640" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3 5" opacity="0.5"/>
  <rect x="403" y="300" width="34" height="20" rx="10" fill="#f8f8f8" stroke="#e5e5e5" stroke-width="1"/>
  <text x="420" y="314" text-anchor="middle" font-size="9" font-weight="700" fill="#888">VS</text>
</svg>
